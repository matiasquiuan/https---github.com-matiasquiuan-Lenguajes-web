<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="FormClase2.css">
</head>
<body>

    <div class="form-container">
        <h1>Formulario de Registro</h1>

        <form action="#" method="POST">
            <!-- Nombre Completo -->
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required>

            <!-- Correo Electrónico -->
            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <!-- Contraseña -->
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <!-- Selección de Género -->
            <label for="genero">Género:</label>
            <select id="genero" name="genero" required>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
                <option value="otro">Otro</option>
            </select>

            <!-- Fecha de Nacimiento -->
            <label for="dob">Fecha de Nacimiento:</label>
            <input type="date" id="dob" name="dob" required>

            <!-- Aficiones -->
            <fieldset>
                <legend>Aficiones:</legend>

                <label for="aficion1">
                    <input type="checkbox" id="aficion1" name="aficiones" value="deportes">
                    Deportes
                </label>

                <label for="aficion2">
                    <input type="checkbox" id="aficion2" name="aficiones" value="musica">
                    Música
                </label>

                <label for="aficion3">
                    <input type="checkbox" id="aficion3" name="aficiones" value="lectura">
                    Lectura
                </label>

                <label for="aficion4">
                    <input type="checkbox" id="aficion4" name="aficiones" value="viajar">
                    Viajar
                </label>
            </fieldset>

            <!-- Nivel de Satisfacción -->
            <fieldset>
                <legend>Nivel de Satisfacción con el Servicio:</legend>

                <label for="satisfaccion1">
                    <input type="radio" id="satisfaccion1" name="satisfaccion" value="muy-satisfecho" required>
                    Muy Satisfecho
                </label>

                <label for="satisfaccion2">
                    <input type="radio" id="satisfaccion2" name="satisfaccion" value="satisfecho">
                    Satisfecho
                </label>

                <label for="satisfaccion3">
                    <input type="radio" id="satisfaccion3" name="satisfaccion" value="neutral">
                    Neutral
                </label>

                <label for="satisfaccion4">
                    <input type="radio" id="satisfaccion4" name="satisfaccion" value="insatisfecho">
                    Insatisfecho
                </label>

                <label for="satisfaccion5">
                    <input type="radio" id="satisfaccion5" name="satisfaccion" value="muy-insatisfecho">
                    Muy Insatisfecho
                </label>
            </fieldset>

            <!-- Comentarios -->
            <label for="comentarios">Comentarios:</label>
            <textarea id="comentarios" name="comentarios" rows="4"></textarea>

            <!-- Términos y Condiciones -->
            <label for="terminos">
                <input type="checkbox" id="terminos" name="terminos" required>
                Acepto los <a href="#">términos y condiciones</a>
            </label>

            <!-- Botones -->
            <button type="submit">Registrarse</button>
            <button type="reset">Reiniciar</button>
        </form>
    </div>

</body>
</html>
